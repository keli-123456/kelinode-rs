name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version label for artifact names, for example v0.1.0
        required: true
        default: v0.1.0
      keli_core_rs_ref:
        description: keli-core-rs ref to bundle
        required: true
        default: main
      create_release:
        description: Publish the packaged files as GitHub Release assets
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout kelinode-rs
        uses: actions/checkout@v4
        with:
          path: kelinode-rs

      - name: Checkout keli-core-rs
        uses: actions/checkout@v4
        with:
          repository: keli-123456/keli-core-rs
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.keli_core_rs_ref || 'main' }}
          path: keli-core-rs

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-musl

      - name: Install Linux compatibility toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${version}" =~ ^v[0-9]+ ]]; then
            echo "release version must start with v, got ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "asset_prefix=keli-native-node-${version}-linux-x86_64" >> "${GITHUB_OUTPUT}"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kelinode-rs/target
            keli-core-rs/target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('kelinode-rs/Cargo.lock', 'keli-core-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-
            ${{ runner.os }}-cargo-

      - name: Build embedded native node binary
        working-directory: kelinode-rs
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --features embedded-core --target x86_64-unknown-linux-musl

      - name: Verify Linux binary compatibility
        working-directory: kelinode-rs
        run: |
          set -euo pipefail
          file target/x86_64-unknown-linux-musl/release/kelinode
          ldd_output="$(ldd target/x86_64-unknown-linux-musl/release/kelinode 2>&1 || true)"
          if printf '%s\n' "$ldd_output" | grep -Eq 'not a dynamic executable|statically linked'; then
            echo "Static musl binary verified."
          else
            echo "Expected a static musl binary; ldd output:" >&2
            printf '%s\n' "$ldd_output" >&2
            exit 1
          fi

      - name: Package native node artifact
        shell: bash
        working-directory: kelinode-rs
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          name="${{ steps.meta.outputs.asset_prefix }}"
          mkdir -p "dist/${name}/bin" "dist/${name}/docs"
          cp target/x86_64-unknown-linux-musl/release/kelinode "dist/${name}/bin/kelinode"
          cp README.md "dist/${name}/"
          cp docs/CONTRACT.md "dist/${name}/CONTRACT.md"
          cp docs/NATIVE_CORE_PARITY.md "dist/${name}/NATIVE_CORE_PARITY.md"
          cp docs/NATIVE_CORE_GRAY_RELEASE.md "dist/${name}/NATIVE_CORE_GRAY_RELEASE.md"
          cp ../keli-core-rs/docs/PARITY.md "dist/${name}/KELI_CORE_RS_PARITY.md"
          cat > "dist/${name}/config.yml.example" <<'YAML'
          kernel:
            type: keli-core-rs
            config_dir: "/etc/kelinode"

          machine:
            enabled: true
            continue_on_error: true
            profiles:
              - name: "default"
                url: "https://panel.example.com"
                token: "replace-me"
                machine_id: 1
          YAML
          cat > "dist/${name}/install.sh" <<'SH'
          #!/usr/bin/env sh
          set -eu
          install_dir="${1:-/usr/local/kelinode}"
          mkdir -p "$install_dir" /etc/kelinode /usr/local/bin
          cp bin/kelinode "$install_dir/kelinode"
          chmod +x "$install_dir/kelinode"
          ln -sf "$install_dir/kelinode" /usr/local/bin/kelinode
          echo "Installed Keli native node to $install_dir"
          echo "Run: $install_dir/kelinode server --config /etc/kelinode/config.yml"
          SH
          chmod +x "dist/${name}/install.sh"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          sha256="$(cut -d ' ' -f 1 "dist/${name}.tar.gz.sha256")"
          cat > "dist/${name}.manifest.json" <<JSON
          {
            "name": "kelinode-rs",
            "version": "${version}",
            "platform": "linux-x86_64",
            "archive": "${name}.tar.gz",
            "sha256": "${sha256}",
            "binary": "kelinode",
            "binaries": {
              "agent": "bin/kelinode"
            },
            "run_args": ["server", "--config", "<config.yml>"],
            "default_core": "embedded-keli-core-rs"
          }
          JSON

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset_prefix }}
          path: |
            kelinode-rs/dist/*.tar.gz
            kelinode-rs/dist/*.sha256
            kelinode-rs/dist/*.manifest.json
          if-no-files-found: error

      - name: Upload GitHub release assets
        if: ${{ github.event_name == 'push' || inputs.create_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: Keli native node ${{ steps.meta.outputs.version }}
          prerelease: false
          files: |
            kelinode-rs/dist/*.tar.gz
            kelinode-rs/dist/*.sha256
            kelinode-rs/dist/*.manifest.json
          fail_on_unmatched_files: true
