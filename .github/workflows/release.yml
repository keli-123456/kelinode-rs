name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label for artifact names, for example v0.1.0
        required: true
        default: v0.1.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-cargo-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          name="kelinode-rs-${{ inputs.version }}-linux-x86_64"
          mkdir -p "dist/${name}"
          cp target/release/kelinode-rs "dist/${name}/"
          cp README.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kelinode-rs-${{ inputs.version }}-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
