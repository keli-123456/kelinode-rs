name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout kelinode-rs
        uses: actions/checkout@v4
        with:
          path: kelinode-rs

      - name: Checkout keli-core-rs
        uses: actions/checkout@v4
        with:
          repository: keli-123456/keli-core-rs
          ref: main
          path: keli-core-rs

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kelinode-rs/target
            keli-core-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('kelinode-rs/Cargo.lock', 'keli-core-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: kelinode-rs
        run: cargo fmt --check

      - name: Run tests
        working-directory: kelinode-rs
        run: cargo test --locked --all-targets -- --test-threads=1

      - name: Build
        working-directory: kelinode-rs
        run: cargo build --locked
